name: CI

# Runs on every push and pull request. A green check here means the catalog
# imports and every visual/game constructs and animates without crashing — the
# gate that protects `main` (and therefore the fleet) from "white screen on boot"
# and crash-on-select bugs. It does NOT check that anything *looks* right; that
# stays a manual check on the dev cabinet.
on:
  push:
    branches: [main, stable]
    # Also gate release tags: a `v*` tag is the deploy pointer for the fleet,
    # so verify the tagged commit is green before cabinets pull it.
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches the cabinets, which run Python 3.13 (confirmed off the
        # SYSTEM INFO panel's PY: line — 3.13.5).
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke + interface-parity tests (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest -q tests/

  # Guard against guide/catalog drift. The generators are the single source of
  # truth; the committed JSON must match what they produce. test_guide_controls
  # only validates entries already IN the JSON — it can't notice a new module
  # that was never regenerated in. This step re-runs the generators and fails if
  # the committed files differ, closing that hole.
  data-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Regenerate guide + catalog and check for drift
        run: |
          # catalog.json first — generate_guide.py reads it as input.
          python3 site/generate_catalog.py
          python3 site/generate_guide.py
          if ! git diff --exit-code -- site/catalog.json site/guide.json; then
            echo "::error::site/catalog.json or site/guide.json is stale."
            echo "Run 'python3 site/generate_catalog.py && python3 site/generate_guide.py' and commit the result."
            exit 1
          fi
