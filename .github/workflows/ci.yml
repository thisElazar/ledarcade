name: CI

# Runs on every push and pull request. A green check here means the catalog
# imports and every visual/game constructs and animates without crashing — the
# gate that protects `main` (and therefore the fleet) from "white screen on boot"
# and crash-on-select bugs. It does NOT check that anything *looks* right; that
# stays a manual check on the dev cabinet.
on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cabinets' actual Python is shown on the SYSTEM INFO panel (PY: line).
        # Once confirmed, narrow this to the single matching version.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke + interface-parity tests (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest -q tests/
